:root {
  --ink: #0f1419;

  --mono: 'IBM Plex Mono', 'Menlo', monospace;

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.7;
  font-size: 16px;

/* ── NAVIGATION ── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;

  border-bottom: 1px solid var(--rule);
  padding: 0 24px;
}

.nav-inner {
  max-width: 1280px;

  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 48px;
  gap: 16px;
}

.nav-brand {
  font-family: var(--mono);
  font-size: 12px;

  letter-spacing: 0.5px;

}

.nav-links {
  display: flex;

<div class="section reveal" id="cell-culture">

    <div class="section-content">
      <h2>Cell Culture &amp; Disease Models</h2>
      <h3>iPSC Platform</h3>
      <p>iPSC expansion, maintenance, QC (morphology, pluripotency markers, mycoplasma), banking, and differentiation across <strong>dopaminergic neurons, cortical/excitatory neurons, astrocytes, microglia-like cells, and endodermal lineages</strong> (hepatic, lung/epithelial, gut, beta islet). Neuronal maturation, co-culture paradigms (neuron–glia, neuron–microglia, immune–neural), 2D and 3D culture systems, organoid-like models, and scale-up for screening.</p>
      <h3>Mammalian Expression Systems</h3>
      <p>CHO and HEK293 expression systems for recombinant protein production. Pool-to-clone workflows, screening funnel design, stable line generation, expression benchmarking, and single-use bioreactor operation (5 L scale). Suspension and adherent culture with long-term stability.</p>
      <h3>Cell Lines</h3>
      <p>20+ cell lines including HEK293/293T, HeLa, U2OS, U87, U251, SH-SY5Y, A549, Calu-3, Caco-2, HMC3, THP-1, LN229, HepG2, Vero E6, COS-7, CHO, Hap1, and RAW264.7. Primary rodent neurons, primary human astrocytes, primary glia/oligodendrocytes, and PBMCs.</p>
      <h3>Biosafety</h3>
      <p>BSL-2 and BSL-3 laboratory experience, aseptic technique, sterility controls, environmental monitoring, and contamination prevention.</p>
    </div>
  </div>
</div>

    <div class="section-content">
      <h2>Genetic Engineering &amp; Molecular Biology</h2>
      <h3>Gene Perturbation</h3>
      <p>CRISPR/Cas9 knockout and knock-in, siRNA/shRNA-mediated knockdown, ASO/SSO-mediated silencing and modulation, lentiviral/adenoviral/AAV transduction, lipid-based transfection, and nucleofection/electroporation.</p>
      <h3>Molecular Cloning</h3>
      <p>Restriction cloning, Gibson assembly, Golden Gate cloning, primer design, PCR, bacterial transformation, colony screening, plasmid preparation (MiniPrep/MaxiPrep), Sanger sequencing, endotoxin-free DNA preparation, and construct design for membrane proteins and reporters.</p>
      <h3>Nucleic Acid &amp; Protein Analysis</h3>
      <p>DNA/RNA extraction and QC, RT-qPCR/ddPCR, RNA-seq sample preparation and coordination, cDNA synthesis, Western blot (including Simple Western/Wes), SDS-PAGE, ELISA/MSD/Luminex multiplex, biochemical fractionation, immunoprecipitation, and His-tagged protein purification.</p>
    </div>
  </div>
</div>

<div class="section reveal" id="assays-skills">
  <div class="section-header">

    </div>
    <div class="section-content">
      <h2>Cellular &amp; Functional Assays</h2>
      <h3>Imaging-Based Assays</h3>
      <p>Immunocytochemistry/immunofluorescence, live-cell imaging, cell painting (LysoTracker, Hoechst, MitoTracker, Cell Mask), high-content screening (Opera Phenix, Incucyte), calcium imaging, MEA-based electrophysiology, and multiplexed staining.</p>
      <h3>Flow Cytometry</h3>
      <p>Multicolor immunophenotyping, intracellular signaling readouts, cell-surface binding assays, gating strategy, compensation controls, activation-state profiling, and FlowJo analysis.</p>
      <h3>Plate-Based &amp; Functional Readouts</h3>
      <p>CellTiter-Glo viability, FLIPR calcium flux and membrane potential (BMG FLUOstar Omega), AlphaLISA, TR-FRET, HTRF, BRET, luminescence/fluorescence plate-reader assays, dose-response and time-course profiling, and 96/384-well miniaturization.</p>
      <h3>Immune &amp; Primary Cell Assays</h3>
      <p>PBMC isolation, culture/activation, and cytokine stimulation. Immune-target co-culture assays. T-cell functional assays. Primary human immune cell workflows. Cytokine quantification (ELISA/MSD/Luminex). Whole blood and hematopoietic cell matrices.</p>
      <h3>Extracellular Vesicle Biology</h3>
      <p>EV/exosome isolation from conditioned media, CD63/CD9 transfer assays, EV characterization by confocal microscopy, immunoblotting, and TEM. Exosome-mediated propagation assays.</p>
    </div>
  </div>

      <h3>Biomarker Development</h3>
      <p>Target engagement (TE) and pharmacodynamic (PD) biomarker panel design. Imaging biomarkers, protein biomarkers (Western/ELISA/MSD), nucleic acid readouts (RT-qPCR, ddPCR, RNA-seq), and mass spectrometry–guided discovery. Biomarker hypothesis development, prioritization, and biological justification.</p>
