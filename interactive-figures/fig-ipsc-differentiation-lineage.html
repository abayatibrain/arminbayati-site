<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPSC Differentiation Lineage Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f1419; --paper: #fafaf7; --mid: #6b7280; --accent: #c0392b;
    --accent-soft: #e74c3c15; --rule: #d4d0c8; --card: #ffffff; --section-bg: #f4f3ef;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', 'Menlo', monospace;
    --ecto: #2563eb; --meso: #d97706; --endo: #059669;
  }
  html.dark {
    --ink: #e8e6e1; --paper: #111318; --mid: #9ca3af; --rule: #2a2d35;
    --card: #1a1d24; --section-bg: #15171d; --accent-soft: rgba(192,57,43,0.15);
    --ecto: #60a5fa; --meso: #fbbf24; --endo: #34d399;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--sans); background: var(--paper); color: var(--ink);
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px 48px; min-height: 100vh;
  }
  .fig-label {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--accent); letter-spacing: 1.2px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .fig-title {
    font-family: var(--serif); font-size: 1.5rem; font-weight: 400;
    color: var(--ink); margin-bottom: 6px; text-align: center;
  }
  .fig-subtitle {
    font-size: 13px; font-weight: 300; color: var(--mid);
    margin-bottom: 32px; text-align: center; max-width: 640px; line-height: 1.6;
  }
  .diagram-container {
    width: 100%; max-width: 1060px; overflow-x: auto; padding: 8px 0;
  }
  svg { display: block; margin: 0 auto; }
  svg text { font-family: var(--sans); }
  .legend {
    display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
    margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--rule);
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--mid); font-weight: 400;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  /* Tooltip */
  .tooltip-box {
    position: fixed; pointer-events: none; z-index: 100;
    background: var(--ink); color: var(--paper); padding: 8px 14px;
    border-radius: 6px; font-size: 12px; font-weight: 400;
    line-height: 1.5; max-width: 260px; opacity: 0;
    transition: opacity 0.15s; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .tooltip-box.show { opacity: 1; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fig-label, .fig-title, .fig-subtitle { animation: fadeIn 0.5s ease both; }
  .fig-title { animation-delay: 0.05s; }
  .fig-subtitle { animation-delay: 0.1s; }
</style>
</head>
<body>
<div class="fig-label">Figure 1</div>
<div class="fig-title">iPSC Differentiation Lineage Map</div>
<div class="fig-subtitle">
  Pluripotent stem cells directed through ectodermal, mesodermal, and endodermal germ layers
  into disease-relevant cell types for modeling and screening.
</div>

<div class="diagram-container">
<svg viewBox="0 0 1040 660" width="1040" height="660" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-ecto" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" opacity="0.6"/>
    </marker>
    <marker id="arrow-meso" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706" opacity="0.6"/>
    </marker>
    <marker id="arrow-endo" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669" opacity="0.6"/>
    </marker>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- iPSC Source Node -->
  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="140" height="80" rx="12" fill="#fff" stroke="#0f1419" stroke-width="1.5" filter="url(#shadow-sm)"/>
    <text x="70" y="30" text-anchor="middle" font-size="11" font-weight="500" letter-spacing="0.8" fill="#c0392b" font-family="'IBM Plex Mono', monospace">PLURIPOTENT</text>
    <text x="70" y="50" text-anchor="middle" font-size="15" font-weight="600" fill="#0f1419">iPSC</text>
    <text x="70" y="67" text-anchor="middle" font-size="10" fill="#6b7280" font-weight="300">9 donor lines banked</text>
  </g>

  <!-- Germ Layer Column -->
  <!-- Ectoderm -->
  <g transform="translate(300, 50)">
    <rect x="0" y="0" width="130" height="54" rx="8" fill="#2563eb" fill-opacity="0.08" stroke="#2563eb" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-size="10" font-weight="500" letter-spacing="0.6" fill="#2563eb" font-family="'IBM Plex Mono', monospace">ECTODERM</text>
    <text x="65" y="40" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">Neural Progenitors</text>
  </g>
  <!-- Mesoderm -->
  <g transform="translate(300, 272)">
    <rect x="0" y="0" width="130" height="54" rx="8" fill="#d97706" fill-opacity="0.08" stroke="#d97706" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-size="10" font-weight="500" letter-spacing="0.6" fill="#d97706" font-family="'IBM Plex Mono', monospace">MESODERM</text>
    <text x="65" y="40" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">Cardiac Progenitors</text>
  </g>
  <!-- Endoderm -->
  <g transform="translate(300, 486)">
    <rect x="0" y="0" width="130" height="54" rx="8" fill="#059669" fill-opacity="0.08" stroke="#059669" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" font-size="10" font-weight="500" letter-spacing="0.6" fill="#059669" font-family="'IBM Plex Mono', monospace">ENDODERM</text>
    <text x="65" y="40" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">Definitive Endoderm</text>
  </g>

  <!-- Connecting lines from iPSC to germ layers -->
  <path d="M200,290 C240,290 260,77 300,77" fill="none" stroke="#2563eb" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow-ecto)" opacity="0.5"/>
  <path d="M200,300 L300,299" fill="none" stroke="#d97706" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow-meso)" opacity="0.5"/>
  <path d="M200,310 C240,310 260,513 300,513" fill="none" stroke="#059669" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrow-endo)" opacity="0.5"/>

  <!-- ════ ECTODERMAL LINEAGES ════ -->
  <!-- DA Neurons -->
  <g class="cell-node" data-tip="TH+/DAT+/GIRK2+ dopaminergic neurons. 4–6 week maturation. PD disease modeling & drug testing.">
    <rect x="520" y="10" width="170" height="52" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1" filter="url(#shadow-sm)"/>
    <text x="535" y="32" font-size="13" font-weight="500" fill="#0f1419">DA Neurons</text>
    <text x="535" y="46" font-size="10" fill="#6b7280" font-weight="300">TH⁺ GIRK2⁺ · 4–6 wk</text>
  </g>
  <!-- Cortical -->
  <g class="cell-node" data-tip="VGLUT1+/GABA+ cortical & excitatory neurons. Alzheimer's and ALS models.">
    <rect x="520" y="72" width="170" height="52" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1" filter="url(#shadow-sm)"/>
    <text x="535" y="94" font-size="13" font-weight="500" fill="#0f1419">Cortical Neurons</text>
    <text x="535" y="108" font-size="10" fill="#6b7280" font-weight="300">VGLUT1⁺ GABA⁺</text>
  </g>
  <!-- Astrocytes -->
  <g class="cell-node" data-tip="GFAP+/S100β+ astrocytes for co-culture inflammation models.">
    <rect x="520" y="134" width="170" height="52" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1" filter="url(#shadow-sm)"/>
    <text x="535" y="156" font-size="13" font-weight="500" fill="#0f1419">Astrocytes</text>
    <text x="535" y="170" font-size="10" fill="#6b7280" font-weight="300">GFAP⁺ S100β⁺</text>
  </g>
  <!-- Microglia -->
  <g class="cell-node" data-tip="IBA1+/CX3CR1+ microglia-like cells for neuroimmune co-culture studies.">
    <rect x="520" y="196" width="170" height="52" rx="8" fill="#fff" stroke="#2563eb" stroke-width="1" filter="url(#shadow-sm)"/>
    <text x="535" y="218" font-size="13" font-weight="500" fill="#0f1419">Microglia-like</text>
    <text x="535" y="232" font-size="10" fill="#6b7280" font-weight="300">IBA1⁺ CX3CR1⁺</text>
  </g>

  <!-- Ectoderm arrows -->
  <line x1="430" y1="77" x2="518" y2="36" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-ecto)" opacity="0.4"/>
  <line x1="430" y1="77" x2="518" y2="98" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-ecto)" opacity="0.4"/>
  <line x1="430" y1="77" x2="518" y2="160" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-ecto)" opacity="0.4"/>
  <line x1="430" y1="77" x2="518" y2="222" stroke="#2563eb" stroke-width="1" marker-end="url(#arrow-ecto)" opacity="0.4"/>

  <!-- ════ MESODERMAL LINEAGES ════ -->
  <!-- Cardiomyocytes -->
  <g class="cell-node" data-tip="cTnT+/α-actinin+ iPSC-CMs via GiWi Wnt modulation. >90% purity. MEA-validated.">
    <rect x="520" y="272" width="170" height="52" rx="8" fill="#fff" stroke="#d97706" stroke-width="1" filter="url(#shadow-sm)"/>
    <text x="535" y="294" font-size="13" font-weight="500" fill="#0f1419">Cardiomyocytes</text>
    <text x="535" y="308" font-size="10" fill="#6b7280" font-weight="300">cTnT⁺ · GiWi protocol</text>
  </g>
  <!-- Macrophages / Immune -->
  <g class="cell-node" data-tip="CD14+/CD68+ iPSC-derived macrophages & monocytes for immune co-culture assays.">
    <rect x="520" y="334" width="170" height="52" rx="8" fill="#fff" stroke="#d97706" stroke-width="1" filter="url(#shadow-sm)"/>
    <text x="535" y="356" font-size="13" font-weight="500" fill="#0f1419">Macrophages</text>
    <text x="535" y="370" font-size="10" fill="#6b7280" font-weight="300">CD14⁺ CD68⁺</text>
  </g>

  <!-- Mesoderm arrows -->
  <line x1="430" y1="299" x2="518" y2="298" stroke="#d97706" stroke-width="1" marker-end="url(#arrow-meso)" opacity="0.4"/>
  <line x1="430" y1="299" x2="518" y2="360" stroke="#d97706" stroke-width="1" marker-end="url(#arrow-meso)" opacity="0.4"/>

  <!-- ════ ENDODERMAL LINEAGES ════ -->
  <!-- Hepatocytes -->
  <g class="cell-node" data-tip="iPSC-derived hepatocyte-like cells for ADME/toxicology studies.">
    <rect x="520" y="446" width="170" height="52" rx="8" fill="#fff" stroke="#059669" stroke-width="1" filter="url(#shadow-sm)"/>
    <text x="535" y="468" font-size="13" font-weight="500" fill="#0f1419">Hepatocytes</text>
    <text x="535" y="482" font-size="10" fill="#6b7280" font-weight="300">ALB⁺ · ADME/Tox</text>
  </g>
  <!-- Lung/Epithelial -->
  <g class="cell-node" data-tip="ACE2+ lung epithelial cells for respiratory infection and SARS-CoV-2 models.">
    <rect x="520" y="508" width="170" height="52" rx="8" fill="#fff" stroke="#059669" stroke-width="1" filter="url(#shadow-sm)"/>
    <text x="535" y="530" font-size="13" font-weight="500" fill="#0f1419">Lung Epithelial</text>
    <text x="535" y="544" font-size="10" fill="#6b7280" font-weight="300">ACE2⁺ · Infection models</text>
  </g>
  <!-- Beta Islet -->
  <g class="cell-node" data-tip="Insulin-producing beta islet cells for diabetes modeling.">
    <rect x="520" y="570" width="170" height="52" rx="8" fill="#fff" stroke="#059669" stroke-width="1" filter="url(#shadow-sm)"/>
    <text x="535" y="592" font-size="13" font-weight="500" fill="#0f1419">β-Islet Cells</text>
    <text x="535" y="606" font-size="10" fill="#6b7280" font-weight="300">INS⁺ · Diabetes models</text>
  </g>

  <!-- Endoderm arrows -->
  <line x1="430" y1="513" x2="518" y2="472" stroke="#059669" stroke-width="1" marker-end="url(#arrow-endo)" opacity="0.4"/>
  <line x1="430" y1="513" x2="518" y2="534" stroke="#059669" stroke-width="1" marker-end="url(#arrow-endo)" opacity="0.4"/>
  <line x1="430" y1="513" x2="518" y2="596" stroke="#059669" stroke-width="1" marker-end="url(#arrow-endo)" opacity="0.4"/>

  <!-- ════ APPLICATION COLUMN ════ -->
  <!-- Disease Modeling -->
  <g>
    <rect x="790" y="60" width="220" height="70" rx="10" fill="var(--section-bg, #f4f3ef)" stroke="var(--rule, #d4d0c8)" stroke-width="1"/>
    <text x="900" y="84" text-anchor="middle" font-size="10" font-weight="500" letter-spacing="0.8" fill="#c0392b" font-family="'IBM Plex Mono', monospace">DISEASE MODELING</text>
    <text x="900" y="102" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">Parkinson's · Alzheimer's</text>
    <text x="900" y="118" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">HCM · DCM · Arrhythmia</text>
  </g>
  <!-- Drug Discovery -->
  <g>
    <rect x="790" y="170" width="220" height="70" rx="10" fill="var(--section-bg, #f4f3ef)" stroke="var(--rule, #d4d0c8)" stroke-width="1"/>
    <text x="900" y="194" text-anchor="middle" font-size="10" font-weight="500" letter-spacing="0.8" fill="#c0392b" font-family="'IBM Plex Mono', monospace">DRUG DISCOVERY</text>
    <text x="900" y="212" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">Parkin Agonists · TAC · PAH</text>
    <text x="900" y="228" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">Cardiotoxicity · Antivirals</text>
  </g>
  <!-- Functional Assays -->
  <g>
    <rect x="790" y="280" width="220" height="70" rx="10" fill="var(--section-bg, #f4f3ef)" stroke="var(--rule, #d4d0c8)" stroke-width="1"/>
    <text x="900" y="304" text-anchor="middle" font-size="10" font-weight="500" letter-spacing="0.8" fill="#c0392b" font-family="'IBM Plex Mono', monospace">FUNCTIONAL ASSAYS</text>
    <text x="900" y="322" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">MEA · Calcium · Imaging</text>
    <text x="900" y="338" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">FLIPR · Impedance · HCS</text>
  </g>
  <!-- Co-Culture -->
  <g>
    <rect x="790" y="390" width="220" height="70" rx="10" fill="var(--section-bg, #f4f3ef)" stroke="var(--rule, #d4d0c8)" stroke-width="1"/>
    <text x="900" y="414" text-anchor="middle" font-size="10" font-weight="500" letter-spacing="0.8" fill="#c0392b" font-family="'IBM Plex Mono', monospace">CO-CULTURE & IMMUNE</text>
    <text x="900" y="432" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">Neuron–Glia · T-cell Killing</text>
    <text x="900" y="448" text-anchor="middle" font-size="11" fill="#0f1419" font-weight="400">PBMC · CAR-T · ADCC</text>
  </g>

  <!-- Application arrows (subtle) -->
  <line x1="692" y1="36" x2="788" y2="80" stroke="var(--rule, #d4d0c8)" stroke-width="1" opacity="0.5"/>
  <line x1="692" y1="298" x2="788" y2="205" stroke="var(--rule, #d4d0c8)" stroke-width="1" opacity="0.5"/>
  <line x1="692" y1="160" x2="788" y2="315" stroke="var(--rule, #d4d0c8)" stroke-width="1" opacity="0.5"/>
  <line x1="692" y1="222" x2="788" y2="425" stroke="var(--rule, #d4d0c8)" stroke-width="1" opacity="0.5"/>

  <!-- Timeline bar at bottom -->
  <g transform="translate(60, 640)">
    <line x1="0" y1="0" x2="940" y2="0" stroke="var(--rule, #d4d0c8)" stroke-width="1"/>
  </g>
</svg>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>Ectodermal</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div>Mesodermal</div>
  <div class="legend-item"><div class="legend-dot" style="background:#059669"></div>Endodermal</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div>Application</div>
</div>

<div class="tooltip-box" id="tooltip"></div>

<script>
  const tooltip = document.getElementById('tooltip');
  document.querySelectorAll('.cell-node').forEach(node => {
    node.style.cursor = 'pointer';
    node.addEventListener('mouseenter', e => {
      const tip = node.getAttribute('data-tip');
      if (!tip) return;
      tooltip.textContent = tip;
      tooltip.classList.add('show');
    });
    node.addEventListener('mousemove', e => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });
    node.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
  });

  }
  });
  
</script>
</body>
</html>
