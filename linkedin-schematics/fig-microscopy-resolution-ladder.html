<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microscopy Resolution Ladder | Armin Bayati</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0f1419;
      --paper: #fafaf7;
      --mid: #6b7280;
      --accent: #c0392b;
      --rule: #d4d0c8;
      --card: #ffffff;
      --section-bg: #f4f3ef;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'IBM Plex Sans', -apple-system, sans-serif;
      --mono: 'IBM Plex Mono', 'Menlo', monospace;
    }
    html.dark {
      --ink: #e8e6e1;
      --paper: #111318;
      --mid: #9ca3af;
      --rule: #2a2d35;
      --card: #1a1d24;
      --section-bg: #15171d;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      padding: 40px 20px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .header {
      margin-bottom: 40px;
      text-align: center;
    }
    h1 {
      font-family: var(--serif);
      font-size: 2.5rem;
      margin-bottom: 8px;
      font-weight: 400;
    }
    .subtitle {
      font-size: 1rem;
      color: var(--mid);
      font-weight: 300;
    }
    .card-wrapper {
      background-color: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .legend {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      font-size: 0.85rem;
      color: var(--mid);
    }
    .legend-item {
      display: inline-block;
      margin-right: 24px;
      margin-bottom: 8px;
    }
    .legend-color {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .attribution {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(15, 20, 25, 0.85);
      color: #fff;
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.3px;
      z-index: 999;
    }
    html.dark .attribution {
      background: rgba(232, 230, 225, 0.15);
      color: var(--ink);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Microscopy Resolution Ladder</h1>
      <p class="subtitle">From cell morphology to atomic structure: the spectrum of biological imaging techniques</p>
    </div>

    <div class="card-wrapper">
      <svg viewBox="0 0 1200 1600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          <style>
            .level-box { cursor: pointer; transition: opacity 0.2s ease; }
            .level-box:hover { opacity: 0.9; }
            .level-title { font-family: 'DM Serif Display', Georgia, serif; font-weight: 500; }
            .level-text { font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; }
          </style>
        </defs>

        <!-- Scale axis (left) -->
        <line x1="80" y1="100" x2="80" y2="1500" stroke="currentColor" stroke-width="2"/>
        <text x="30" y="50" font-family="var(--sans)" font-size="14" fill="currentColor" font-weight="500">Resolution</text>

        <!-- Scale labels -->
        <text x="85" y="1520" font-family="var(--mono)" font-size="11" fill="#6b7280">0.5 nm</text>
        <text x="85" y="1100" font-family="var(--mono)" font-size="11" fill="#6b7280">10 nm</text>
        <text x="85" y="800" font-family="var(--mono)" font-size="11" fill="#6b7280">50 nm</text>
        <text x="85" y="500" font-family="var(--mono)" font-size="11" fill="#6b7280">300 nm</text>
        <text x="85" y="200" font-family="var(--mono)" font-size="11" fill="#6b7280">1 μm</text>

        <!-- Horizontal gridlines -->
        <line x1="70" y1="1500" x2="1150" y2="1500" stroke="#d4d0c8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
        <line x1="70" y1="1200" x2="1150" y2="1200" stroke="#d4d0c8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
        <line x1="70" y1="900" x2="1150" y2="900" stroke="#d4d0c8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
        <line x1="70" y1="600" x2="1150" y2="600" stroke="#d4d0c8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
        <line x1="70" y1="300" x2="1150" y2="300" stroke="#d4d0c8" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

        <!-- 1. Phase Contrast / Brightfield (~1 μm) -->
        <rect class="level-box" x="120" y="240" width="1000" height="100" fill="#3b82f6" opacity="0.15" rx="4"/>
        <rect x="120" y="240" width="1000" height="5" fill="#3b82f6" rx="2"/>
        <text class="level-title" x="140" y="285" font-size="18" fill="currentColor">Phase Contrast / Brightfield</text>
        <text class="level-text" x="140" y="310" fill="#6b7280">~1 μm resolution  •  Cell morphology, counting, viability  •  Hepatocytes, neurons, fibroblasts</text>

        <!-- 2. Widefield Fluorescence (~300 nm) -->
        <rect class="level-box" x="120" y="340" width="1000" height="100" fill="#06b6d4" opacity="0.15" rx="4"/>
        <rect x="120" y="340" width="1000" height="5" fill="#06b6d4" rx="2"/>
        <text class="level-title" x="140" y="385" font-size="18" fill="currentColor">Widefield Fluorescence</text>
        <text class="level-text" x="140" y="410" fill="#6b7280">~300 nm resolution  •  Immunofluorescence, live imaging  •  Vesicles, focal adhesions, nuclear bodies</text>

        <!-- 3. Confocal Point-Scanning (~200 nm) -->
        <rect class="level-box" x="120" y="540" width="1000" height="100" fill="#10b981" opacity="0.15" rx="4"/>
        <rect x="120" y="540" width="1000" height="5" fill="#10b981" rx="2"/>
        <text class="level-title" x="140" y="585" font-size="18" fill="currentColor">Confocal Point-Scanning</text>
        <text class="level-text" x="140" y="610" fill="#6b7280">~200 nm XY resolution  •  Optical sections, Z-stacks, colocalization  •  Organelles, ER-mitochondria contacts</text>

        <!-- 4. Spinning Disk Confocal (~200 nm) -->
        <rect class="level-box" x="120" y="740" width="1000" height="100" fill="#8b5cf6" opacity="0.15" rx="4"/>
        <rect x="120" y="740" width="1000" height="5" fill="#8b5cf6" rx="2"/>
        <text class="level-title" x="140" y="785" font-size="18" fill="currentColor">Spinning Disk Confocal</text>
        <text class="level-text" x="140" y="810" fill="#6b7280">~200 nm resolution  •  Fast live imaging, reduced phototoxicity  •  Dynamic vesicle trafficking, synaptic events</text>

        <!-- 5. Structured Illumination (SIM) (~100 nm) -->
        <rect class="level-box" x="120" y="940" width="1000" height="100" fill="#ec4899" opacity="0.15" rx="4"/>
        <rect x="120" y="940" width="1000" height="5" fill="#ec4899" rx="2"/>
        <text class="level-title" x="140" y="985" font-size="18" fill="currentColor">Structured Illumination (SIM)</text>
        <text class="level-text" x="140" y="1010" fill="#6b7280">~100 nm resolution  •  Super-resolution, live compatible  •  Protein complexes, membrane domains</text>

        <!-- 6. STED Nanoscopy (~50 nm) -->
        <rect class="level-box" x="120" y="1140" width="1000" height="100" fill="#f59e0b" opacity="0.15" rx="4"/>
        <rect x="120" y="1140" width="1000" height="5" fill="#f59e0b" rx="2"/>
        <text class="level-title" x="140" y="1185" font-size="18" fill="currentColor">STED Nanoscopy</text>
        <text class="level-text" x="140" y="1210" fill="#6b7280">~50 nm resolution  •  Single protein complexes, synaptic ultrastructure  •  Neuronal architecture, vesicle clusters</text>

        <!-- 7. Cryo-EM (~3 Å) -->
        <rect class="level-box" x="120" y="1340" width="1000" height="100" fill="#f97316" opacity="0.15" rx="4"/>
        <rect x="120" y="1340" width="1000" height="5" fill="#f97316" rx="2"/>
        <text class="level-title" x="140" y="1385" font-size="18" fill="currentColor">Cryo-EM</text>
        <text class="level-text" x="140" y="1410" fill="#6b7280">~3 Å resolution  •  Near-atomic protein structures  •  Membrane proteins, macromolecular assemblies</text>
      </svg>

      <div class="legend">
        <div class="legend-item"><span class="legend-color" style="background-color: #3b82f6;"></span> Conventional Optical</div>
        <div class="legend-item"><span class="legend-color" style="background-color: #10b981;"></span> Confocal/Optical Sectioning</div>
        <div class="legend-item"><span class="legend-color" style="background-color: #8b5cf6;"></span> Super-Resolution</div>
        <div class="legend-item"><span class="legend-color" style="background-color: #f97316;"></span> Electron Microscopy</div>
      </div>
    </div>
  </div>

  <div class="attribution">Armin Bayati · arminbayati.com</div>

  <script>
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (prefersDark) {
      document.documentElement.classList.add('dark');
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (e.matches) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    });
  </script>
</body>
</html>
