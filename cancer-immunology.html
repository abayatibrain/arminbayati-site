body::before {
  content: "";
  position: fixed;
  inset: 0;

<div class="hero">
  <div class="hero-eyebrow">Immuno-Oncology</div>
  <h1>Cancer Immunology &amp; Immune Cell Engineering</h1>
  <p class="hero-description">
    I develop and deploy immunological assays that characterize tumor-immune interactions, checkpoint biology, CAR-T and NK cell function, and immune cell co-culture systems. My work integrates flow cytometry, multiplex cytokine quantification, and functional killing assays to enable mechanistic understanding and translational readouts.
  </p>
  <div class="hero-tags">
    <span class="tag">T-Cell Killing</span>
    <span class="tag">ADCC</span>
    <span class="tag">CDC</span>
    <span class="tag">Checkpoint</span>
    <span class="tag">CAR-T</span>
    <span class="tag">NK Cells</span>
    <span class="tag">Cytokine Profiling</span>
    <a class="tag" href="flow-cytometry.html">PBMC</a>
    <a class="tag" href="flow-cytometry.html">Flow Cytometry</a>
    <span class="tag">Immune Co-Culture</span>
  </div>
</div>

<div class="section reveal" id="immune-killing">
  <div class="section-header">
    <div class="section-index">
      <div class="section-number">01</div>
      <div class="section-label">Immune Killing</div>
    </div>
    <div class="section-content">
      <h2>Immune Cell Killing Assays</h2>
      <p>I design and execute T-cell mediated killing, antibody-dependent cellular cytotoxicity (ADCC), complement-dependent cytotoxicity (CDC), and optimize effector-to-target ratios to profile immune potency and mechanistic dependencies. Assays employ primary human T-cells, NK cells, and macrophages in co-culture with fluorescently-labeled or viability-dye-stained target cells, with quantification by flow cytometry or luciferase-based readouts.</p>

      <div class="subsection">
        <div class="subsection-label">T-Cell Killing Dose-Response</div>
        <div class="chart-container">
          <div class="chart-title">Fig. 1A — T-Cell Mediated Cytotoxicity</div>
          <div class="chart-subtitle">Dose-dependent lysis of target cells by anti-PD-L1-enhanced T-cells across effector-to-target ratios</div>
          <canvas id="tCellKillingChart" height="280"></canvas>
          <div class="chart-note">Primary human T-cells co-cultured 4h with labeled target cells. Anti-PD-L1 shows checkpoint-dependent enhanced killing. Specific lysis calculated as (experimental release − spontaneous release) / (maximum release − spontaneous release) × 100%.</div>
        </div>
      </div>

      <div class="subsection">
        <div class="subsection-label">ADCC Activity Profile</div>
        <div class="chart-container">
          <div class="chart-title">Fig. 1B — Antibody-Dependent Cellular Cytotoxicity</div>
          <div class="chart-subtitle">Comparative ADCC activity of therapeutic antibodies at E:T 10:1</div>
          <canvas id="adccChart" height="280"></canvas>
          <div class="chart-note">Freshly isolated PBMCs (effector) co-cultured with antibody-opsonized target cells. Trastuzumab and Rituximab show superior ADCC compared to Cetuximab. Isotype control minimal background.</div>
        </div>
      </div>

      <div class="subsection">
        <div class="subsection-label">CDC Kinetics</div>
        <div class="chart-container">
          <div class="chart-title">Fig. 1C — Complement-Dependent Cytotoxicity Over Time</div>
          <div class="chart-subtitle">Kinetic profile of complement-mediated target cell lysis</div>
          <canvas id="cdcChart" height="280"></canvas>
          <div class="chart-note">Target cells opsonized with anti-target antibody ± human complement serum. Maximal lysis achieved by 2h. Antibody or complement alone show minimal activity.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section reveal" id="checkpoint">
  <div class="section-header">
    <div class="section-index">
      <div class="section-number">02</div>
      <div class="section-label">Checkpoints</div>
    </div>
    <div class="section-content">
      <h2>Checkpoint Biology &amp; Immune Modulation</h2>
      <p>I characterize the expression and functional role of inhibitory checkpoint receptors (PD-1, CTLA-4, LAG-3, TIM-3, TIGIT) on tumor-infiltrating and circulating T-cells. Checkpoint blockade assays measure rescue of exhausted T-cell function, IFN-γ secretion, and proliferation using anti-checkpoint monoclonal antibodies and ligand-blocking strategies.</p>

      <div class="subsection">
        <div class="subsection-label">Checkpoint Expression Profile</div>
        <div class="chart-container">
          <div class="chart-title">Fig. 2A — Checkpoint Receptor Expression</div>
          <div class="chart-subtitle">Mean fluorescence intensity (MFI) fold-change on tumor-infiltrating T-cells vs peripheral blood T-cells</div>
          <canvas id="checkpointExprChart" height="300"></canvas>
          <div class="chart-note">Multicolor flow cytometry. TILs show elevated checkpoint expression consistent with T-cell exhaustion. PB = peripheral blood T-cells; TIL = tumor-infiltrating lymphocytes.</div>
        </div>
      </div>

      <div class="subsection">
        <div class="subsection-label">Blockade Functional Assay</div>
        <div class="chart-container">
          <div class="chart-title">Fig. 2B — Checkpoint Blockade Rescues T-Cell Function</div>
          <div class="chart-subtitle">IFN-γ secretion by exhausted T-cells ± anti-checkpoint antibodies</div>
          <canvas id="blockadeChart" height="280"></canvas>
          <div class="chart-note">Exhausted T-cells (PD-1 high) stimulated with anti-CD3/CD28 ± anti-PD-1, anti-CTLA-4, or combination. Dual blockade shows superior functional rescue. Quantified by multiplex bead assay (Luminex).</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section reveal" id="cytokine">
  <div class="section-header">
    <div class="section-index">
      <div class="section-number">03</div>
      <div class="section-label">Cytokines</div>
    </div>
    <div class="section-content">
      <h2>Cytokine Profiling &amp; Biomarker Discovery</h2>
      <p>I employ multiplex immunoassays including Luminex, MSD V-PLEX, and AlphaLISA to quantify immune-relevant cytokines (IL-2, IL-6, IL-10, IFN-γ, TNF-α, IL-17A, Granzyme B) from T-cell co-cultures and immune-oncology screens. Dose-response profiling identifies optimal pathway modulation and therapeutic windows.</p>

      <div class="subsection">
        <div class="subsection-label">Cytokine Panel Heatmap</div>
        <div class="chart-container">
          <div class="chart-title">Fig. 3A — Comprehensive Cytokine Panel</div>
          <div class="chart-subtitle">Multiplex quantification of immune activation markers across conditions</div>
          <canvas id="cytokineHeatmapChart" height="300"></canvas>
          <div class="chart-note">Supernatants from T-cell co-cultures collected at 48h. Unstim = resting; Stim = anti-CD3/CD28; Stim+Drug = stimulated + checkpoint inhibitor. Values normalized to unstimulated baseline.</div>
        </div>
      </div>

      <div class="subsection">
        <div class="subsection-label">Dose-Response Cytokine</div>
        <div class="chart-container">
          <div class="chart-title">Fig. 3B — Dose-Dependent Cytokine Secretion</div>
          <div class="chart-subtitle">IL-2 and IFN-γ titration profiles across drug concentrations</div>
          <canvas id="doseResponseChart" height="280"></canvas>
          <div class="chart-note">T-cells stimulated with checkpoint inhibitor at increasing concentrations (0.01–100 nM). Both cytokines show dose-dependent increase with plateau at higher concentrations. EC50 determination informs optimal dosing.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section reveal" id="car-t">
  <div class="section-header">
    <div class="section-index">
      <div class="section-number">04</div>
      <div class="section-label">CAR-T</div>
    </div>
    <div class="section-content">
      <h2>CAR-T &amp; Engineered Immune Cells</h2>
      <p>I characterize CAR-T cell transduction efficiency, expansion kinetics, phenotype stability, and in vitro potency. Assays measure transduction rates by flow cytometry (CAR expression via tag-specific antibodies), expansion capacity over 14–21 days, exhaustion markers, and target-cell killing across CAR-T designs and target lineages.</p>

      <div class="subsection">
        <div class="subsection-label">CAR-T Expansion Kinetics</div>
        <div class="chart-container">
          <div class="chart-title">Fig. 4A — CAR-T Expansion Over Culture Period</div>
          <div class="chart-subtitle">Fold-expansion of transduced vs untransduced T-cells over 14 days in culture</div>
          <canvas id="carTExpansionChart" height="280"></canvas>
          <div class="chart-note">CAR-T cells show enhanced proliferation kinetics and reach higher peak expansion (~80-fold by day 12). Untransduced T-cells plateau earlier (~20-fold). Both cultured with IL-2 supplementation and anti-CD3/CD28 stimulation.</div>
        </div>
      </div>

      <div class="subsection">
        <div class="subsection-label">CAR-T Potency Assay</div>
        <div class="chart-container">
          <div class="chart-title">Fig. 4B — CAR-T-Mediated Target Cell Killing</div>
          <div class="chart-subtitle">Specific lysis of CD19+ and CD19− target cells by CAR-T vs untransduced T-cells</div>
          <canvas id="carTPotencyChart" height="280"></canvas>
          <div class="chart-note">CAR-T (anti-CD19) co-cultured with Raji, Nalm-6 (CD19+), or K562 (CD19−) target cells at E:T 5:1. CAR-T shows antigen-specific killing; minimal off-target activity against K562. Untransduced T-cells show background killing.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
}, { threshold: 0.08 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
